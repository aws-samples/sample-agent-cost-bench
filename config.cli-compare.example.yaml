# cli-compare — run coding CLIs against the same vibe tasks and compare cost.
#
#   agent-cost-bench cli-compare run config.cli-compare.example.yaml
#
# Authentication: each CLI reads its API key from its own auth mechanism.
# Log in to each CLI before running the benchmark:
#
#   kiro login                       # Kiro
#   claude login                     # Claude Code (or export ANTHROPIC_API_KEY)
#   copilot auth login               # GitHub Copilot
#   cursor login  (or agent login)   # Cursor (stores token in macOS Keychain;
#                                    #   CURSOR_API_KEY env var alone is NOT sufficient)
#   codex auth login                 # Codex (or export OPENAI_API_KEY)
#
# The harness inherits the parent shell's environment, so all CLIs pick up
# their keys automatically — no per-runner `env:` block needed.
#
# `comparison_label` is a reporting headline only — it names what this run
# compares. Optional; defaults to "cross-CLI comparison".
#
# cost_source is inferred automatically from the binary name:
#   kiro / kiro-cli  → kiro_credits
#   claude           → claude_json
#   copilot          → copilot_json
#   codex            → codex_json
#   cursor           → cursor_json
# You can still set it explicitly if needed, but in most cases it's not required.

comparison_label: Opus 4.8 (Kiro / Claude Code / Copilot / Cursor)

# LLM-as-judge for rubric tasks (optional — only needed if task_ids includes
# rubric tasks like bedrock-sentiment that have quality.rubric).
# judge_model: claude-opus-4.8
# judge_cli_path: kiro-cli
# judge_weight: 0.6

runners:
  # ── Kiro CLI (claude-opus-4.8) ────────────────────────────────────────────
  - name: kiro
    display_name: "Kiro (claude-opus-4.8)"
    cli_path: kiro-cli
    model_id: claude-opus-4.8
    pricing:
      usd_per_credit: 0.04
    cli_base_args: [chat, --no-interactive, --trust-all-tools,
                    "--model={model}", "--effort={effort}"]

  # ── Claude Code (claude-opus-4.8) ─────────────────────────────────────────
  # cost is read directly from --output-format json (total_cost_usd field)
  - name: claude-code
    display_name: "Claude Code (claude-opus-4.8)"
    cli_path: claude
    model_id: us.anthropic.claude-opus-4-8
    cli_base_args: ["-p", "{prompt}", "--output-format", "json",
                    "--model", "{model}", "--dangerously-skip-permissions",
                    "--effort", "{effort}"]

  # ── GitHub Copilot (claude-opus-4.8) ──────────────────────────────────────
  - name: copilot
    display_name: "GitHub Copilot (claude-opus-4.8)"
    cli_path: copilot
    model_id: claude-opus-4.8
    pricing:
      usd_per_premium_request: 0.04   # fallback if session-state AIU unavailable
    cli_base_args: ["-p", "{prompt}", "--model", "{model}",
                    "--allow-all-tools", "--output-format", "json",
                    "--effort", "{effort}"]

  # ── Cursor (claude-opus-4.8-thinking-max) ─────────────────────────────────
  # Cursor encodes effort/thinking as part of the model slug, not a separate
  # flag. The harness automatically appends the task's effort level to the
  # model_id below (e.g. model_id "claude-opus-4-8" + effort "high" →
  # "claude-opus-4-8-high"). If you bake the effort into model_id yourself
  # (e.g. "claude-opus-4-8-thinking-max"), no suffix is appended.
  #
  # Model slug reference (Opus 4.8):
  #   claude-opus-4-8-low               = Low
  #   claude-opus-4-8-medium            = Medium
  #   claude-opus-4-8-high              = High (default)
  #   claude-opus-4-8-xhigh            = Extra High
  #   claude-opus-4-8-max               = Max
  #   claude-opus-4-8-thinking-low      = Low Thinking
  #   claude-opus-4-8-thinking-medium   = Medium Thinking
  #   claude-opus-4-8-thinking-xhigh   = Extra High Thinking
  #   claude-opus-4-8-thinking-max      = Max Thinking
  #   Append "-fast" for fast variants
  #
  # Pricing: from https://cursor.com/docs/models-and-pricing (API pool)
  # Opus 4.8: Input $5/M, Cache Write $6.25/M, Cache Read $0.50/M, Output $25/M
  - name: cursor
    display_name: "Cursor (claude-opus-4.8)"
    cli_path: agent
    model_id: claude-opus-4-8
    cost_source: cursor_json
    pricing:
      usd_per_input_token:        0.000005     # $5.00  / 1M (fresh input)
      usd_per_cache_write_token:  0.00000625   # $6.25  / 1M (cache write)
      usd_per_cached_input_token: 0.0000005    # $0.50  / 1M (cache read)
      usd_per_output_token:       0.000025     # $25.00 / 1M
    capabilities:
      requires_pty: true
    cli_base_args: ["-p", "{prompt}", "--trust","--yolo", "--output-format", "json",
                    "--model", "{model}"]

  # # ── OpenAI Codex (gpt-5.5) ────────────────────────────────────────────────
  # # Pricing reference: https://developers.openai.com/api/docs/pricing?latest-pricing=standard
  # # gpt-5.5 standard rates (per 1M tokens): input $5.00 / cached $0.50 / output $30.00
  # #
  # # Formula:  cost = (input - cached) / 1M × input_rate
  # #                + cached           / 1M × cached_input_rate
  # #                + output           / 1M × output_rate
  # # Note: reasoning_output_tokens is a subset of output_tokens, not extra.
  # - name: codex
  #   display_name: "OpenAI Codex (gpt-5.5)"
  #   cli_path: codex
  #   model_id: gpt-5.5
  #   pricing:
  #     usd_per_input_token:        0.000005     # $5.00  / 1M
  #     usd_per_cached_input_token: 0.0000005    # $0.50  / 1M
  #     usd_per_output_token:       0.000030     # $30.00 / 1M
  #   cli_base_args:
  #     - "exec"
  #     - "--json"
  #     - "--ephemeral"
  #     - "--skip-git-repo-check"
  #     - "--dangerously-bypass-approvals-and-sandbox"
  #     - "-m"
  #     - "{model}"
  #     - "{prompt}"

# Task discovery (cli-compare is vibe-only; spec tasks are skipped)
tasks_dir: tasks
task_ids: 
modes: ["vibe"]

# LLM-as-judge
judge_cli_path: kiro-cli
judge_model: claude-opus-4.8
judge_weight: 0.6

# Execution
concurrency: per_target
timeout_minutes: 20
repeats: 1
functional_pass_threshold: 0.99
workspace_base: /tmp/agent-cost-bench-cli-compare

# Reporting
output_dir: results
report_title: "Benchmark Analysis: Opus 4.8 (Kiro vs Claude Code vs Copilot vs Cursor)"
open_report: true
