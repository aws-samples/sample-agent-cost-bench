<style>
  :root {
    --bg: #0f1117; --card: #1a1d27; --border: #2a2e3a; --text: #e4e7ee;
    --muted: #9aa0ac; --accent: #6ea8fe; --pass: #34d399; --fail: #f87171;
    --warn: #fbbf24; --cost: #d8b4fe;
  }
  * { box-sizing: border-box; }
  body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
         background: var(--bg); color: var(--text); line-height: 1.5; }
  .wrap { max-width: 1200px; margin: 0 auto; padding: 32px 20px 80px; }
  h1 { font-size: 26px; margin: 0 0 4px; }
  h2 { font-size: 18px; margin: 36px 0 14px; border-bottom: 1px solid var(--border); padding-bottom: 8px; }
  h3 { font-size: 14px; color: var(--muted); font-weight: 600; }
  .sub { color: var(--muted); font-size: 14px; margin-bottom: 24px; }
  .sub b { color: var(--text); }
  .cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 14px; }
  .card { background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 16px 18px; }
  .card .label { color: var(--muted); font-size: 12px; text-transform: uppercase; letter-spacing: .04em; }
  .card .value { font-size: 26px; font-weight: 600; margin-top: 6px; }
  .card .value.cost { color: var(--cost); }
  table { width: 100%; border-collapse: collapse; font-size: 14px; background: var(--card);
          border: 1px solid var(--border); border-radius: 10px; overflow: hidden; }
  th, td { padding: 10px 12px; text-align: left; border-bottom: 1px solid var(--border); }
  th { color: var(--muted); font-weight: 600; font-size: 12px; text-transform: uppercase; letter-spacing: .03em; }
  td.num, th.num { text-align: right; font-variant-numeric: tabular-nums; }
  tr:last-child td { border-bottom: none; }
  .badge { display: inline-block; padding: 2px 9px; border-radius: 999px; font-size: 12px; font-weight: 600; }
  .badge.pass { background: rgba(52,211,153,.15); color: var(--pass); }
  .badge.fail, .badge.error { background: rgba(248,113,113,.15); color: var(--fail); }
  .badge.timeout { background: rgba(251,191,36,.15); color: var(--warn); }
  .badge.unavailable, .badge.skip { background: rgba(216,180,254,.15); color: var(--cost); }
  .na { color: var(--muted); font-style: italic; }
  .cost { color: var(--cost); font-variant-numeric: tabular-nums; }
  .chart-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
  .chart-box { background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 16px; }
  .chart-box h3 { margin: 0 0 12px; }
  details { background: var(--card); border: 1px solid var(--border); border-radius: 8px; margin-top: 6px; }
  details summary { padding: 10px 12px; cursor: pointer; font-size: 13px; }
  details pre { margin: 0; padding: 12px; background: #0c0e14; overflow-x: auto; font-size: 12px;
                border-top: 1px solid var(--border); white-space: pre-wrap; }
  .hint { color: var(--muted); font-size: 13px; margin: 8px 0 0; }
  .hint code { background: rgba(255,255,255,.07); padding: 1px 5px; border-radius: 4px; font-size: 12px; }
  @media (max-width: 760px) { .chart-grid { grid-template-columns: 1fr; } }
</style>
