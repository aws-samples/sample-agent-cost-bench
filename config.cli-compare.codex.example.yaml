# cli-compare — Kiro CLI vs OpenAI Codex on the same vibe tasks.
#
#   agent-cost-bench cli-compare run config.cli-compare.codex.example.yaml
#
# Prerequisites:
#   1. Codex CLI installed:  npm install -g @openai/codex
#   2. Authenticated with OpenAI:  codex login  (or set OPENAI_API_KEY)
#   3. Kiro CLI installed and logged in as normal.
#
# cost_source is inferred automatically — no need to set it.
#   kiro / kiro-cli binary → kiro_credits
#   codex binary           → codex_json
#
# ── Pricing reference ────────────────────────────────────────────────────────
# https://developers.openai.com/api/docs/pricing?latest-pricing=standard
# Standard (non-batch, non-flex) rates, June 2026.
#
# Formula:
#   uncached_input = input_tokens - cached_input_tokens
#   cost = uncached_input      / 1M × input_rate
#        + cached_input_tokens / 1M × cached_input_rate
#        + output_tokens       / 1M × output_rate
#
# NOTE: reasoning_output_tokens is a SUBSET of output_tokens — not additive.
#
# Standard rates per 1M tokens:
#
#   Model             input    cached_input    output
#   ─────────────────────────────────────────────────────────────────────────
#   o4-mini           $1.10       $0.275        $4.40
#   o3                $2.00       $0.500        $8.00
#   o3-mini           $1.10       $0.550        $4.40
#   o1               $15.00       $7.500       $60.00
#   ─────────────────────────────────────────────────────────────────────────
#   gpt-5.5           $5.00       $0.500       $30.00
#   gpt-5.5-pro      $30.00         n/a       $180.00
#   gpt-5.4           $2.50       $0.250       $15.00
#   gpt-5.4-mini      $0.75       $0.075        $4.50
#   gpt-5.4-pro      $30.00         n/a       $180.00
#   gpt-4o            $2.50       $1.250       $10.00
#   gpt-4.1           $2.00       $0.500        $8.00
#   ─────────────────────────────────────────────────────────────────────────
#
# Kiro rates: $0.04/credit. Update pricing.usd_per_credit if your plan differs.
# ─────────────────────────────────────────────────────────────────────────────

comparison_label: Kiro Sonnet 4.6 vs Codex o4-mini

runners:
  # ── Kiro CLI ───────────────────────────────────────────────────────────────
  - name: kiro
    display_name: "Kiro (claude-sonnet-4.6)"
    cli_path: kiro-cli
    model_id: claude-sonnet-4.6
    pricing:
      usd_per_credit: 0.04
    cli_base_args: [chat, --no-interactive, --trust-all-tools,
                    "--model={model}", "--effort={effort}"]

  # ── OpenAI Codex ───────────────────────────────────────────────────────────
  # Switch the model_id and pricing block to compare different OpenAI models.
  - name: codex
    display_name: "OpenAI Codex (o4-mini)"
    cli_path: codex
    model_id: o4-mini

    # ── o4-mini ($1.10 / $0.275 / $4.40 per 1M) ──────────────────────────
    pricing:
      usd_per_input_token:        0.0000011    # $1.10  / 1M
      usd_per_cached_input_token: 0.000000275  # $0.275 / 1M
      usd_per_output_token:       0.0000044    # $4.40  / 1M

    # ── o3 ($2.00 / $0.50 / $8.00 per 1M) ───────────────────────────────
    # pricing:
    #   usd_per_input_token:        0.000002
    #   usd_per_cached_input_token: 0.0000005
    #   usd_per_output_token:       0.000008

    # ── gpt-5.5 ($5.00 / $0.50 / $30.00 per 1M) ─────────────────────────
    # pricing:
    #   usd_per_input_token:        0.000005
    #   usd_per_cached_input_token: 0.0000005
    #   usd_per_output_token:       0.000030

    # ── gpt-5.5-pro ($30.00 / n/a / $180.00 per 1M) ─────────────────────
    # pricing:
    #   usd_per_input_token:        0.000030
    #   usd_per_output_token:       0.000180

    # ── gpt-5.4 ($2.50 / $0.25 / $15.00 per 1M) ─────────────────────────
    # pricing:
    #   usd_per_input_token:        0.0000025
    #   usd_per_cached_input_token: 0.00000025
    #   usd_per_output_token:       0.000015

    # ── gpt-5.4-mini ($0.75 / $0.075 / $4.50 per 1M) ────────────────────
    # pricing:
    #   usd_per_input_token:        0.00000075
    #   usd_per_cached_input_token: 0.000000075
    #   usd_per_output_token:       0.0000045

    # ── gpt-5.4-pro ($30.00 / n/a / $180.00 per 1M) ─────────────────────
    # pricing:
    #   usd_per_input_token:        0.000030
    #   usd_per_output_token:       0.000180

    cli_base_args:
      - "exec"
      - "--json"
      - "--ephemeral"
      - "--skip-git-repo-check"
      - "--dangerously-bypass-approvals-and-sandbox"
      - "-m"
      - "{model}"
      - "{prompt}"

# Task discovery (cli-compare is vibe-only)
tasks_dir: tasks
task_ids:
modes: ["vibe"]

# LLM-as-judge for rubric tasks
judge_cli_path: kiro-cli
judge_model: claude-opus-4.8
judge_weight: 0.6

# Execution
concurrency: per_target
timeout_minutes: 20
repeats: 1
transient_retries: 2
functional_pass_threshold: 0.99
workspace_base: /tmp/agent-cost-bench-codex-compare

# Reporting
output_dir: results
report_title: "Kiro (Sonnet 4.6) vs OpenAI Codex (o4-mini)"
open_report: true
